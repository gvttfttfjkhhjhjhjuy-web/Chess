<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satranç Analiz Botu - Stockfish</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <h1>♟️ Stockfish Analiz Botu</h1>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="container">
        
        <!-- SOL PANEL -->
        <aside class="left-panel">
            <div class="info-box">
                <h3>Motor Durumu</h3>
                <p id="engine-status">🔄 Yükleniyor...</p>
            </div>
            <div class="info-box">
                <h3>Değerlendirme</h3>
                <p id="eval-text">0.0</p>
            </div>
        </aside>

        <!-- TAHTA BÖLÜMÜ -->
        <section class="board-section">
            <div class="eval-bar">
                <div id="eval-fill"></div>
            </div>
            <div id="board"></div>
        </section>

        <!-- SAĞ PANEL -->
        <aside class="right-panel">
            <div class="controls-box">
                <h3>Kontroller</h3>
                <label>Zorluk Seviyesi:</label>
                <select id="zorluk-seviyesi">
                    <option value="0">Acemi</option>
                    <option value="5">Orta</option>
                    <option value="15">Zor</option>
                    <option value="20" selected>Usta</option>
                </select>
                <button id="reset-btn" onclick="yeniOyun()">🔄 Sıfırla</button>
            </div>
        </aside>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div id="koc-mesaji" class="koc-mesaji">
            Stockfish motoru hazırlanıyor. Lütfen bekleyin...
        </div>
    </footer>

    <!-- SCRIPTS - DOĞRU SIRADA YÜKLENİYOR -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
